# -------------------------------------------------------------------
# Lookup instructions for agents:
#
# Antes de criar QUALQUER novo pattern, template, component, skill ou rule:
#
# 1. Busque neste registry por domain e type
# 2. Se match com adaptability >= 0.9 -> REUSE diretamente
# 3. Se match com adaptability >= 0.6 -> ADAPT (max 30% de mudancas)
# 4. Somente CREATE se nao houver match adequado
# 5. Registre novas entidades em ate 24h apos criacao
#
# Para CREATE, documente obrigatoriamente:
#   - evaluated_patterns: entidades consideradas
#   - rejection_reasons: por que cada uma foi rejeitada
#   - new_capability: que capacidade unica esta entidade fornece
#
# Referencia completa: ~/.claude/rules/ids-principles.md
# -------------------------------------------------------------------
