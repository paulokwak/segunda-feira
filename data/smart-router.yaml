      - "produto"
      - "product"
      - "roadmap"
      - "backlog"
      - "priorizacao"
      - "discovery"
      - "metricas produto"
    agent: "@product"
    fallback: ["@pm", "@po"]
    priority: 7
    category: "development"
    description: "Gestao de produto, roadmap, priorizacao e discovery"

  # =========================================================================
  # 2. STORY MANAGEMENT
