      - role: "copy"
        agent: "@copywriter"
      - role: "creative"
        agent: "@creative-director"
      - role: "growth"
        agent: "@growth-hacker"
    description: "Campanha de conteudo: estrategia + copy + criativos + growth"

  - intent: "sales_pipeline_setup"
