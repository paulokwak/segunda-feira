      - "pipeline de vendas completo"
      - "funil de vendas"
      - "maquina de vendas"
    agents:
      - role: "prospection"
        agent: "@cold-outreach"
      - role: "qualification"
        agent: "@sdr"
      - role: "closing"
        agent: "@closer"
      - role: "offer"
        agent: "@offer-engineer"
      - role: "whatsapp"
