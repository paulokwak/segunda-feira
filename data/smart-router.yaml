# ============================================================================
# MULTI-AGENT COLLABORATION
# ============================================================================
# Tarefas complexas que requerem colaboracao entre multiplos agentes.
# O primeiro agente da lista e o lider/coordenador.
# ============================================================================

multi_agent:

  - intent: "full_launch"
    keywords:
      - "lancamento completo"
      - "lançar produto"
      - "campanha completa"
      - "go-to-market completo"
    agents:
      - role: "leader"
        agent: "@launch-strategist"
      - role: "copy"
        agent: "@copywriter"
      - role: "creative"
        agent: "@creative-director"
      - role: "traffic"
        agent: "@traffic"
      - role: "automation"
        agent: "@automation-architect"
    description: "Lancamento completo: estrategia + copy + criativos + trafego + automacao"

  - intent: "full_stack_feature"
    keywords:
      - "feature completa"
      - "funcionalidade end-to-end"
      - "full stack"
    agents:
      - role: "architect"
        agent: "@architect"
      - role: "database"
        agent: "@data-engineer"
      - role: "frontend_backend"
        agent: "@dev"
      - role: "qa"
        agent: "@qa"
      - role: "deploy"
        agent: "@devops"
    description: "Feature full stack: arquitetura + DB + dev + QA + deploy"

  - intent: "content_campaign"
    keywords:
      - "campanha de conteudo"
      - "producao de conteudo"
      - "conteudo semanal"
      - "batch de posts"
    agents:
      - role: "strategy"
