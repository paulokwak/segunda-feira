# Smart Router — Segunda-feira Framework
# Roteamento automatico de tarefas para agentes
# Ultima atualizacao: 2026-03-29
#
# O Smart Router analisa a intencao do usuario (keywords + contexto)
# e roteia para o agente mais adequado, com fallback chain.
# Se confianca < threshold, pergunta ao usuario.

version: "1.0"

default_agent: "@aios-master"
confidence_threshold: 0.6

# ============================================================================
# ROUTING RULES
# ============================================================================
# Cada regra define:
#   intent        - identificador unico da intencao
#   keywords      - palavras-chave que ativam (PT-BR + EN)
#   agent         - agente primario
#   fallback      - cadeia de fallback (tentados em ordem)
#   priority      - 1 (baixa) a 10 (maxima) — resolve conflitos entre regras
#   category      - dominio para agrupamento logico
#   description   - descricao curta da regra (PT-BR)
# ============================================================================

routing_rules:

  # =========================================================================
  # 1. DEVELOPMENT
  # =========================================================================

  - intent: "code_implementation"
    keywords:
      - "implementar"
      - "codar"
      - "programar"
      - "desenvolver"
      - "feature"
      - "bug fix"
      - "refatorar"
      - "codigo"
      - "code"
      - "develop"
      - "funcionalidade"
      - "corrigir bug"
      - "criar componente"
    agent: "@dev"
    fallback: ["@architect", "@aios-master"]
    priority: 9
    category: "development"
    description: "Implementacao de codigo, features, bug fixes e refatoracao"

  - intent: "code_review"
    keywords:
      - "review"
      - "qa"
      - "testar"
      - "qualidade"
      - "validar codigo"
      - "lint"
      - "typecheck"
      - "testes"
      - "coverage"
      - "qa gate"
      - "qa-loop"
    agent: "@qa"
    fallback: ["@dev", "@aios-master"]
    priority: 8
    category: "development"
    description: "Review de codigo, testes, QA gate e validacao de qualidade"

  - intent: "architecture"
    keywords:
      - "arquitetura"
      - "architecture"
      - "design system"
      - "stack"
      - "tecnologia"
      - "padrao"
      - "pattern"
      - "estrutura"
      - "diagrama"
      - "complexidade"
      - "brownfield"
      - "technical debt"
      - "divida tecnica"
    agent: "@architect"
    fallback: ["@dev", "@aios-master"]
    priority: 8
    category: "development"
    description: "Decisoes de arquitetura, stack, patterns e avaliacoes tecnicas"

  - intent: "database"
    keywords:
      - "banco de dados"
      - "database"
      - "schema"
      - "migration"
      - "migracao"
      - "SQL"
      - "query"
      - "index"
      - "RLS"
      - "tabela"
      - "supabase"
      - "postgresql"
      - "DDL"
    agent: "@data-engineer"
    fallback: ["@architect", "@dev"]
    priority: 8
    category: "development"
    description: "Schema, migrations, queries, RLS e otimizacao de banco de dados"

  - intent: "deploy_devops"
    keywords:
      - "deploy"
      - "push"
      - "PR"
      - "pull request"
      - "CI/CD"
      - "pipeline"
      - "release"
      - "git push"
      - "merge"
      - "produção"
      - "VPS"
      - "PM2"
      - "nginx"
      - "SSL"
    agent: "@devops"
    fallback: ["@ops-monitor", "@aios-master"]
    priority: 10
    category: "development"
    description: "Deploy, git push, PRs, CI/CD e infraestrutura de release"

  - intent: "ux_design"
    keywords:
      - "UX"
      - "UI"
      - "design"
      - "interface"
      - "wireframe"
      - "prototipo"
      - "usabilidade"
      - "frontend spec"
      - "layout"
      - "responsivo"
    agent: "@ux-design-expert"
    fallback: ["@architect", "@dev"]
    priority: 7
    category: "development"
    description: "Design de interface, UX, wireframes e especificacoes frontend"

  - intent: "product_management"
